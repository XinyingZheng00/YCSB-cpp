# HCTree benchmark properties
# Use these settings for both the load and run phases:
#   ./ycsb -db sqlite -P workloads/workloada_hctree -P sqlite/hctree.properties ...

# Path to the HCTree database file (must be an absolute path or relative to CWD).
sqlite.dbpath=/tmp/hctree_ycsb.db

# WAL mode is required for HCTree (BEGIN CONCURRENT needs WAL).
sqlite.journal_mode=WAL

# PRAGMA synchronous=OFF gives maximum write throughput (matches perftest1.tcl).
# Use NORMAL for a safer durability/performance trade-off.
sqlite.synchronous=FULL

# 1 GB memory-mapped I/O — eliminates pread/pwrite for reader threads.
sqlite.mmap_size=1073741824

# Page size matching perftest1.tcl default (4096 bytes).
sqlite.page_size=4096

# Shared page cache: ~256 MB (negative value = kibibytes).
sqlite.cache_size=-262144

# Busy timeout in ms — give writers time to acquire the WAL write lock.
sqlite.busy_timeout=30000

# Keep file locks held across transactions (matches hct_thread_test.c).
# Eliminates per-transaction lock syscall overhead in WAL mode.
sqlite.locking_mode=EXCLUSIVE

# HCTree-specific: number of CAS retries before evicting a page from the
# in-memory hash table.  Matches the default in hct_thread_test.c.
sqlite.hct_try_before_unevict=100

# Disable SQLite's built-in auto-checkpoint (matches hct_thread_test.c which
# sets wal_autocheckpoint=10000).  The WAL hook-based checkpointer handles
# checkpointing explicitly at ~16 MB instead.
sqlite.wal_autocheckpoint=10000

# Use BEGIN CONCURRENT so multiple writer threads can prepare their changes in
# parallel; the application-level mutex in Insert/Update then serialises only
# the COMMIT step.
sqlite.begin_concurrent_transactions=true


# Schema
sqlite.primary_key=user_id
sqlite.create_table=true
