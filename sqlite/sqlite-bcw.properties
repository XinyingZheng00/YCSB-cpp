# BCW (BEGIN CONCURRENT + WAL2) benchmark properties
# Use these settings for both the load and run phases:
#   ./ycsb -db sqlite -P workloads/workloada_hctree -P sqlite/sqlite-bcw.properties ...
#
# BCW mode = standard SQLite with BEGIN CONCURRENT + WAL2 patches.
# No HCTree custom B-tree; the URI does NOT include ?hctree=1.
# Commit serialisation is handled by the same application-level mutex as HCTree mode.

# Path to the BCW database file.
sqlite.dbpath=/tmp/bcw_ycsb.db

# Disable HCTree mode: opens without ?hctree=1, enabling standard SQLite B-tree.
sqlite.hctree_mode=false

# WAL2 is required for BCW mode (BEGIN CONCURRENT + WAL2 patch).
sqlite.journal_mode=WAL2

# Match HCTree benchmark settings for a fair comparison.
sqlite.synchronous=FULL
sqlite.mmap_size=1073741824
sqlite.page_size=4096
sqlite.cache_size=-262144
sqlite.busy_timeout=30000

# Limit WAL2 file size to ~16 MB (matches mkthreadtest.tcl journal_size_limit).
sqlite.journal_size_limit=16777216

# BCW does not use locking_mode=exclusive or wal_autocheckpoint (WAL2 manages
# its own checkpointing; exclusive locking is not set in the official bcw config).

# Use BEGIN CONCURRENT so multiple writer threads can prepare in parallel;
# only the COMMIT step is serialised by the application mutex.
sqlite.begin_concurrent_transactions=true

# Schema
sqlite.primary_key=user_id
sqlite.create_table=true
