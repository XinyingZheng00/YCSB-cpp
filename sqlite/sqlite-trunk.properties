# Traditional SQLite (cpp binding) benchmark properties
#
# Same library as bcw2/hctree (hctree-bedrock 3.54.0) but configured to
# behave like upstream SQLite trunk — no hctree, plain WAL, plain BEGIN.
# Used to measure (a) JDBC-vs-cpp binding overhead by comparing against
# the trunk JDBC results, and (b) single-thread cost of WAL2 + BEGIN
# CONCURRENT by comparing against bcw2.
#
# Usage:
#   ./ycsb -db sqlite -P workloads/workloada_hctree -P sqlite/sqlite-trunk.properties ...

sqlite.dbpath=/tank/ycsb_data/trunkcpp_ycsb/trunkcpp_ycsb.db

# No HCTree storage engine: opens without ?hctree=1.
sqlite.hctree_mode=false

# Plain WAL (not WAL2). Traditional SQLite write-ahead log.
sqlite.journal_mode=WAL

# Match other sets for fair comparison.
sqlite.synchronous=FULL
# Disable mmap so cache_size is the only in-RAM page buffer (uniform 128 MB budget across all systems).
sqlite.mmap_size=0
sqlite.page_size=4096
# Negative = kibibytes; -131072 KB = 128 MB per-connection page cache.
sqlite.cache_size=-131072
sqlite.busy_timeout=30000
sqlite.locking_mode=EXCLUSIVE

# Plain BEGIN, NOT BEGIN CONCURRENT. This is the key knob that
# distinguishes "traditional SQLite" from bcw2.
sqlite.begin_concurrent_transactions=false

# Schema
sqlite.primary_key=user_id
sqlite.create_table=true
