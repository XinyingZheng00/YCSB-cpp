rocksdb.dbname=/tmp/ycsb-rocksdb
rocksdb.format=single
rocksdb.destroy=false
rocksdb.sync=false

# Per-operation DB mode (rocksdb.per_op_db=true)
#
# Each benchmark operation opens the RocksDB instance immediately before the
# op and closes it immediately after.  This lets N threads share the same
# on-disk DB path even though RocksDB only allows one writer at a time: threads
# serialize via the LOCK file, and the retry loop below handles contention.
#
# When to use:
#   You want to measure the cost of repeated open/close cycles against a shared
#   DB, or you need strict single-handle semantics per operation.
#
# Expected performance:
#   Much slower than the default shared-handle mode (hundreds of ms per op vs.
#   microseconds), because every operation pays DB::Open + DB::Close overhead.
#   That overhead is the intended measurement target.
#
# rocksdb.per_op_db=false
# rocksdb.per_op_db_max_retries=100
# rocksdb.per_op_db_retry_base_us=1000

# Load options from file
#rocksdb.optionsfile=rocksdb/options.ini

# Below options are ignored if options file is used
rocksdb.compression=snappy
rocksdb.max_background_jobs=2
rocksdb.target_file_size_base=67108864
rocksdb.target_file_size_multiplier=1
rocksdb.max_bytes_for_level_base=268435456
rocksdb.write_buffer_size=67108864
rocksdb.max_open_files=-1
rocksdb.max_write_buffer_number=2
rocksdb.use_direct_io_for_flush_compaction=false
rocksdb.use_direct_reads=false
rocksdb.allow_mmap_writes=false
rocksdb.allow_mmap_reads=false
rocksdb.cache_size=8388608
rocksdb.bloom_bits=0

# deprecated since rocksdb 8.0
rocksdb.compressed_cache_size=0

rocksdb.increase_parallelism=false
rocksdb.optimize_level_style_compaction=false
